<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <link rel="stylesheet" href="css/shop.css" />
    <link rel="stylesheet" href="css/shop-layout.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@800&display=swap"
    />
  </head>
  <body>
    <div class="shop">
      <nav class="nav" id="nav">
        <img
          class="logo-icon"
          alt=""
          src="./assets/images/brand/logo.png"
          id="lOGOImage"
        /><button class="products" id="products">Products</button
        ><button class="orders" id="orders">Orders</button>
      </nav>
      <div class="order-details">
        <div class="details" id="details">
          <div class="details-child" id="details"></div>
          <a class="item" id="item">Item</a><a class="location">location</a
          ><a class="time">Time</a><a class="status">Status</a
          ><a class="payment-method">Payment Method</a>
        </div>
      </div>
    </div>

    <script src="js/shop.js"></script>
  </body>
</html>
